name: flutter_clean_architecture_bloc
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  injectable: ^3.0.0
  get_it: ^9.2.1
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  intl: ^0.20.2
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  build_runner: ^2.15.0
  bloc_lint: ^0.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/

